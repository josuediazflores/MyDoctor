<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Doctor — Walk in prepared</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['Fraunces', 'ui-serif', 'Georgia', 'serif'],
          sans:  ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        },
      }
    }
  }
</script>
<style>
  :root {
    --bg:           #f3efe7;
    --surface:      #faf7f0;
    --sunken:       #ebe5d6;
    --text:         #1f2419;
    --text-2:       #5c5848;
    --text-faint:   #8a8576;
    --border:       #d9d2c0;
    --border-strong:#b8b09c;
    --accent:       #3d5a3d;
    --accent-hover: #2e4830;
    --accent-soft:  #e0e8dc;
    --accent-contrast: #c47b4d;
    --sev-low:  #7b9b6e;
    --sev-mid:  #c89855;
    --sev-high: #a8513f;
    --warn-text:#7a4a1a;
    --warn-bg:  #f0e3c8;
    --warn-bd:  #d4a85a;
    --shadow-lift:  0 2px 8px rgba(31, 36, 25, 0.04);
    --shadow-modal: 0 8px 32px rgba(31, 36, 25, 0.08);
  }
  html, body { background: var(--bg); color: var(--text); }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
  .tabular { font-variant-numeric: tabular-nums; }
  .smallcaps { text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 600; color: var(--text-2); }

  /* Editorial citation chip */
  .cite {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    color: var(--text-2);
    text-decoration: underline dotted var(--text-faint);
    text-underline-offset: 3px;
    cursor: pointer;
    transition: color 200ms ease-out, text-decoration-color 200ms ease-out;
  }
  .cite:hover { color: var(--accent-contrast); text-decoration-color: var(--accent-contrast); }

  /* Slow pulse used for "Processing..." */
  @keyframes calm-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  .calm-pulse { animation: calm-pulse 2000ms ease-in-out infinite; }

  /* Skeleton shimmer — restrained */
  @keyframes calm-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--sunken) 0%, #e2dcc8 50%, var(--sunken) 100%);
    background-size: 200% 100%;
    animation: calm-shimmer 2400ms linear infinite;
    border-radius: 4px;
  }

  /* Reveal fade for generated content */
  @keyframes calm-reveal {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { animation: calm-reveal 480ms ease-out both; }

  @media (prefers-reduced-motion: reduce) {
    .calm-pulse, .skeleton, .reveal { animation: none !important; }
  }

  /* Range slider — severity */
  input[type="range"].sev {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 8px; border-radius: 999px;
    background: transparent;
  }
  input[type="range"].sev::-webkit-slider-runnable-track {
    height: 8px; border-radius: 999px;
    background: var(--track, #d9d2c0);
  }
  input[type="range"].sev::-moz-range-track {
    height: 8px; border-radius: 999px;
    background: var(--track, #d9d2c0);
  }
  input[type="range"].sev::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 24px; height: 24px; border-radius: 999px;
    background: var(--thumb, #3d5a3d);
    border: 2px solid #faf7f0;
    margin-top: -8px;
    box-shadow: 0 2px 8px rgba(31, 36, 25, 0.12);
    cursor: pointer;
    transition: background 200ms ease-out;
  }
  input[type="range"].sev::-moz-range-thumb {
    width: 24px; height: 24px; border-radius: 999px;
    background: var(--thumb, #3d5a3d);
    border: 2px solid #faf7f0;
    box-shadow: 0 2px 8px rgba(31, 36, 25, 0.12);
    cursor: pointer;
  }

  /* Focus rings — quiet, just border color */
  .ring-quiet:focus-within { border-color: var(--accent); }

  /* Hover lift */
  .lift { transition: box-shadow 200ms ease-out, transform 200ms ease-out, border-color 200ms ease-out; }
  .lift:hover { box-shadow: var(--shadow-lift); }

  /* Print styles for prep report */
  @media print {
    body { background: #fff; color: #000; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .print-page {
      max-width: 720px; margin: 0 auto; padding: 0;
    }
    .print-card { border: none !important; background: #fff !important; padding: 0 !important; }
  }
  .print-only { display: none; }

  /* Decorative editorial divider */
  .rule {
    height: 1px; background: var(--border); border: 0;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="mascot.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="visit-detail.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
